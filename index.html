<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bella Vita</title>
<style>
:root{
  --bg:#1a1a18;--card:#232320;--card2:#2a2a27;--border:#333330;
  --text:#f0ede6;--sub:#888882;
  --green:#4CAF7D;--green2:#2d7a50;--green-dim:#1e4a32;
  --red:#e05555;--red-dim:#4a1e1e;
  --yellow:#d4a843;--yellow-dim:#4a3a1a;
  --blue:#5b9bd5;--blue-dim:#1a2e45;
  --r:10px;--r2:6px;--sh:0 2px 12px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overflow-x:hidden;}
.app{max-width:480px;margin:0 auto;padding-bottom:80px;}
.hdr{background:#111110;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:.5px solid var(--border);}
.hdr-logo{height:32px;width:auto;}
.hdr-badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.hdr-badge.red{background:var(--red-dim);color:var(--red);border:.5px solid #7a3333;}
.hdr-badge.green{background:var(--green-dim);color:var(--green);border:.5px solid var(--green2);}
.nav{display:flex;background:#111110;border-bottom:.5px solid var(--border);position:sticky;top:57px;z-index:199;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex:0 0 auto;padding:10px 14px;font-size:11px;font-weight:600;color:var(--sub);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.nb.on{color:var(--green);border-bottom-color:var(--green);}
.sec{padding:12px;display:none;}
.sec.on{display:block;}
.card{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);padding:14px;margin-bottom:10px;}
.card-title{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
label{font-size:12px;color:var(--sub);display:block;margin-bottom:4px;margin-top:10px;}
label:first-of-type{margin-top:0;}
input,select,textarea{width:100%;padding:10px 12px;border:.5px solid var(--border);border-radius:var(--r2);font-size:14px;background:var(--card2);color:var(--text);-webkit-appearance:none;appearance:none;}
input:focus,select:focus{outline:none;border-color:var(--green);}
select option{background:#2a2a27;}
.ac-wrap{position:relative;}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--card2);border:.5px solid var(--green);border-radius:var(--r2);z-index:300;max-height:220px;overflow-y:auto;box-shadow:var(--sh);display:none;}
.ac-item{padding:10px 12px;cursor:pointer;border-bottom:.5px solid var(--border);font-size:13px;}
.ac-item:hover{background:var(--green-dim);}
.ac-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.btn{padding:11px 18px;border-radius:var(--r2);font-size:14px;font-weight:600;border:none;cursor:pointer;}
.btn-p{background:var(--green);color:#fff;}
.btn-s{background:var(--card2);color:var(--text);border:.5px solid var(--border);}.btn-d{background:var(--red-dim);color:var(--red);border:.5px solid var(--red);}
.row{display:flex;gap:8px;}
.row .btn{flex:1;}
.fact-item{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.fact-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.fact-num{font-size:11px;color:var(--sub);font-weight:600;}
.fact-monto{font-size:16px;font-weight:700;}
.fact-cliente{font-size:14px;font-weight:600;margin-bottom:3px;}
.fact-row2{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.fact-fecha{font-size:11px;color:var(--sub);}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;}
.b-pagada{background:var(--green-dim);color:var(--green);border:.5px solid var(--green2);}
.b-vencida{background:var(--red-dim);color:var(--red);border:.5px solid #7a3333;}
.b-abierta{background:var(--blue-dim);color:var(--blue);border:.5px solid #2a4a6a;}
.b-parte_pagada{background:var(--yellow-dim);color:var(--yellow);border:.5px solid #7a5a20;}
.filtros{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.filtros::-webkit-scrollbar{display:none;}
.fbtn{flex:0 0 auto;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:.5px solid var(--border);background:var(--card2);color:var(--sub);cursor:pointer;}
.fbtn.on{background:var(--green-dim);color:var(--green);border-color:var(--green2);}
.cli-item{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.cli-nombre{font-size:14px;font-weight:600;}
.cli-id{font-size:10px;color:var(--sub);margin-bottom:2px;}
.cli-contacto{font-size:11px;color:var(--sub);margin-top:2px;}
.cli-deuda-monto{font-size:13px;font-weight:700;color:var(--red);}
.cli-deuda-label{font-size:10px;color:var(--sub);}
.cli-tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:12px;}
.cli-tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;}
.cli-tab.on{color:var(--green);border-bottom-color:var(--green);}
.cli-tab-content{display:none;}
.cli-tab-content.on{display:block;}
.art-item{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);padding:11px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.art-nombre{font-size:13px;font-weight:500;flex:1;margin-right:10px;}
.art-precio{font-size:14px;font-weight:700;color:var(--green);}
.art-costo{font-size:11px;color:var(--sub);}
.art-margen{font-size:10px;color:var(--yellow);margin-top:2px;}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--card2);border-radius:var(--r2);margin-bottom:6px;border:.5px solid var(--border);}
.item-info{flex:1;}
.item-prod{font-size:13px;font-weight:500;}
.item-det{font-size:11px;color:var(--sub);margin-top:2px;}
.item-sub{font-size:14px;font-weight:700;color:var(--green);}
.item-del{color:var(--red);font-size:18px;padding:4px 8px;cursor:pointer;}
.total-box{background:var(--card2);border-radius:var(--r);border:.5px solid var(--border);padding:12px;margin-top:8px;}
.total-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.total-row.grand{font-size:17px;font-weight:800;color:var(--green);margin-top:8px;padding-top:8px;border-top:.5px solid var(--border);}
.reporte-card{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);padding:14px;margin-bottom:10px;}
.rep-title{font-size:13px;font-weight:700;margin-bottom:12px;}
.rep-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--border);}
.rep-row:last-child{border-bottom:none;}
.rep-label{font-size:12px;color:var(--sub);}
.rep-val{font-size:14px;font-weight:700;}
.rep-val.pos{color:var(--green);}
.rep-val.neg{color:var(--red);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);padding:12px;}
.stat-val{font-size:20px;font-weight:800;color:var(--green);}
.stat-label{font-size:11px;color:var(--sub);margin-top:3px;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-end;}
.modal-ov.on{display:flex;}
.modal{background:var(--card);border-radius:var(--r) var(--r) 0 0;padding:20px 16px 32px;width:100%;max-height:85vh;overflow-y:auto;border-top:.5px solid var(--border);}
.modal-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:15px;}
.notif{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
.notif.show{opacity:1;}
.ped-item{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);padding:12px 14px;margin-bottom:8px;}
.ped-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.ped-cliente{font-size:14px;font-weight:700;}
.ped-fecha{font-size:11px;color:var(--sub);}
.ped-prods{font-size:12px;color:var(--sub);margin-bottom:6px;}
.ped-footer{display:flex;justify-content:space-between;align-items:center;}
.ped-total{font-size:15px;font-weight:700;color:var(--green);}
.ped-btn{padding:5px 10px;border-radius:var(--r2);font-size:11px;font-weight:600;border:none;cursor:pointer;}
.ped-btn-ok{background:var(--green-dim);color:var(--green);}
.empty{text-align:center;padding:48px 20px;color:var(--sub);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.info-box{background:var(--card2);border-radius:var(--r2);padding:10px 12px;margin-top:8px;border:.5px solid var(--border);}
.info-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
.info-label{color:var(--sub);}
.info-val{font-weight:600;}
.pago-fact-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--card2);border-radius:var(--r2);margin-bottom:6px;border:.5px solid var(--border);}
.pago-fact-info{flex:1;}
.pago-fact-num{font-size:11px;color:var(--sub);}
.pago-fact-monto{font-size:13px;font-weight:600;}
.pago-fact-aplicado{font-size:12px;color:var(--green);font-weight:700;}
.msg{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.6;max-width:88%;margin-bottom:8px;white-space:pre-wrap;}
.msg-user{background:var(--green2);color:#fff;margin-left:auto;border-bottom-right-radius:3px;}
.msg-ai{background:var(--card2);color:var(--text);border-bottom-left-radius:3px;}
.msg-wrap{display:flex;flex-direction:column;}
.chat-msgs{min-height:150px;max-height:45vh;overflow-y:auto;padding:8px 0;margin-bottom:12px;}
.qbtns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.qbtn{padding:6px 11px;background:var(--card2);border:.5px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;color:var(--sub);font-weight:500;}
.lista-item{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);padding:14px;margin-bottom:8px;}
.lista-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.lista-nombre{font-size:14px;font-weight:700;}
.lista-canal{font-size:11px;color:var(--sub);background:var(--card2);padding:3px 8px;border-radius:10px;}
.lista-prod-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--border);}
.lista-prod-row:last-child{border-bottom:none;}
.lista-prod-nombre{font-size:12px;color:var(--sub);}
.lista-prod-precio{font-size:14px;font-weight:700;color:var(--green);}
</style>

<style id="printStyles">
@media print {
  #pdfOverlay > div:first-child { display: none !important; }
  #pdfContent { padding: 0 !important; }
  body > *:not(#pdfOverlay) { display: none !important; }
  #pdfOverlay { position: static !important; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
</style>

<script>
const _D=JSON.parse(document.getElementById("bvAppData").textContent);
window._IMGS=(function(){
  var keys=['pet3000','pet2000','pet1000','pet500','pet250','v500','v250'];
  var r={};
  keys.forEach(function(k){
    var el=document.getElementById('bvimg_'+k);
    if(el)r[k]=el.src;
  });
  return r;
})();

const FACTS=_D.facturas;
const CLIS=_D.clientes;
const ARTS=_D.articulos;
const PRECIOS=_D.precios;
const DEUDA=_D.deuda||{};

let pedidos=JSON.parse(localStorage.getItem('bv_pedidos')||'[]');
let presupuestos=JSON.parse(localStorage.getItem('bv_presup')||'[]');
let listasCustom=JSON.parse(localStorage.getItem('bv_listas')||'[]');
let pagosExtra=JSON.parse(localStorage.getItem('bv_pagos_extra')||'{}');
let factLocal=JSON.parse(localStorage.getItem('bv_factlocal')||'[]');

function save(){
  localStorage.setItem('bv_pedidos',JSON.stringify(pedidos));
  localStorage.setItem('bv_presup',JSON.stringify(presupuestos));
  localStorage.setItem('bv_listas',JSON.stringify(listasCustom));
  localStorage.setItem('bv_pagos_extra',JSON.stringify(pagosExtra));
  localStorage.setItem('bv_factlocal',JSON.stringify(factLocal));
}

function getAllFacts(){return [...FACTS,...factLocal].sort((a,b)=>b.id-a.id);}
const $=id=>document.getElementById(id);
function fmt(n){if(!n&&n!==0)return'0';return Math.round(n).toLocaleString('es-AR');}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function notif(txt){const el=$('notif');el.textContent=txt;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function labelEstado(e){return{pagada:'Pagada',vencida:'Vencida',abierta:'Abierta',parte_pagada:'Parte pagada'}[e]||e;}
function showSec(id,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  $('sec-'+id).classList.add('on');btn.classList.add('on');
  const r={facturas:renderFacturas,clientes:renderClientes,articulos:renderArticulos,reportes:renderReportes,pedidos:renderPedidos,presupuestos:renderPresup,listas:renderListas};
  if(r[id])r[id]();
}
function cerrarModal(){$('modalMain').classList.remove('on');}
function abrirModal(html){$('modalContent').innerHTML=html;$('modalMain').classList.add('on');}

function initHeader(){
  const k=localStorage.getItem('bv_key')||'';
  if(k&&$('apiKey'))$('apiKey').value=k;
  const facts=getAllFacts();
  const venc=facts.filter(f=>f.e==='vencida').reduce((a,f)=>a+f.p,0);
  const el=$('hdrDeuda');
  if(venc>0){el.className='hdr-badge red';el.textContent='Vencido $'+fmt(venc);}
  else{el.className='hdr-badge green';el.textContent='Al dia';}
}

// FACTURAS
let factFiltro='todas';
function filtrarFact(estado,btn){
  factFiltro=estado;
  document.querySelectorAll('#sec-facturas .fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderFacturas();
}
function renderFacturas(){
  const q=($('searchFact')?.value||'').toLowerCase().trim();
  let facts=getAllFacts();
  if(factFiltro!=='todas')facts=facts.filter(f=>f.e===factFiltro);
  if(q)facts=facts.filter(f=>f.c.toLowerCase().includes(q)||String(f.id).includes(q));
  const el=$('listaFacturas');
  if(!facts.length){el.innerHTML='<div class="empty"><div class="empty-icon">&#129534;</div><div>Sin resultados</div></div>';return;}
  const totalPend=facts.reduce((a,f)=>a+f.p,0);

// PAGO EN CASCADA
function abrirPagoCascada(cid){
  const c=CLIS.find(x=>x.id===cid);
  const fp=getAllFacts().filter(f=>f.ci===cid&&f.p>0).sort((a,b)=>a.id-b.id);
  if(!fp.length){notif('No hay facturas pendientes');return;}
  const tp=fp.reduce((a,f)=>a+f.p,0);
  let h='<div class="modal-title">Registrar pago &mdash; '+esc(c?c.n:String(cid))+'</div>'
    +'<div style="font-size:12px;color:var(--sub);margin-bottom:12px;">Total pendiente: <strong style="color:var(--red);">$'+fmt(tp)+'</strong></div>'
    +'<label>Monto recibido</label>'
    +'<input type="number" id="pagoMonto" placeholder="0" inputmode="numeric" oninput="simCascada('+cid+')">'
    +'<label>Fecha</label>'
    +'<input type="date" id="pagoFecha" value="'+new Date().toISOString().split('T')[0]+'">'
    +'<div id="cascadaPreview" style="margin-top:12px;"></div>'
    +'<div class="row" style="margin-top:16px;">'
    +'<button class="btn btn-p" onclick="confirmarPago('+cid+')">Confirmar</button>'
    +'<button class="btn btn-s" onclick="cerrarModal()">Cancelar</button>'
    +'</div>';
  abrirModal(h);
}
function simCascada(cid){
  const m=parseFloat($('pagoMonto')?.value)||0;
  if(!m){$('cascadaPreview').innerHTML='';return;}
  const fp=getAllFacts().filter(f=>f.ci===cid&&f.p>0).sort((a,b)=>a.id-b.id);
  let rest=m,h='<div style="font-size:11px;color:var(--sub);margin-bottom:6px;">Imputacion (mas antigua primero):</div>';
  for(const f of fp){
    if(rest<=0)break;
    const ap=Math.min(rest,f.p);rest-=ap;
    h+='<div class="pago-fact-row"><div class="pago-fact-info"><div class="pago-fact-num">#'+f.id+' &bull; '+f.f+'</div><div class="pago-fact-monto">Pendiente $'+fmt(f.p)+'</div></div><div class="pago-fact-aplicado">-$'+fmt(ap)+'</div></div>';
  }
  if(rest>0)h+='<div style="background:var(--yellow-dim);border-radius:var(--r2);padding:8px 10px;margin-top:6px;font-size:12px;color:var(--yellow);">Saldo a favor: $'+fmt(rest)+'</div>';
  $('cascadaPreview').innerHTML=h;
}
function confirmarPago(cid){
  const m=parseFloat($('pagoMonto')?.value)||0;
  const f=$('pagoFecha')?.value||'';
  if(m<=0){notif('Ingresa un monto');return;}
  if(!pagosExtra[cid])pagosExtra[cid]=[];
  pagosExtra[cid].unshift({monto:m,fecha:f.split('-').reverse().join('/')});
  let rest=m;
  const fp=getAllFacts().filter(x=>x.ci===cid&&x.p>0).sort((a,b)=>a.id-b.id);
  for(const x of fp){
    if(rest<=0)break;
    const ap=Math.min(rest,x.p);rest-=ap;
    x.p=Math.max(0,x.p-ap);x.pg=(x.pg||0)+ap;
    if(x.p===0)x.e='pagada';else if(x.pg>0)x.e='parte_pagada';
  }
  if(DEUDA[cid])DEUDA[cid].tp=Math.max(0,(DEUDA[cid].tp||0)-m);
  save();cerrarModal();notif('Pago de $'+fmt(m)+' registrado');initHeader();
}

let artsEdit = JSON.parse(localStorage.getItem('bv_arts_edit')||'{}');

function getArts(){

function guardarNuevoArt(){
  const n=$('artNom')?.value?.trim();
  const v=parseFloat($('artPrecio')?.value)||0;
  const k=parseFloat($('artCosto')?.value)||0;
  if(!n){notif('Ingresá un nombre');return;}
  artsEdit[n]={n,v,k,nuevo:true};
  saveArts();cerrarModal();renderArticulos();notif('Artículo guardado');
}

function editarArticulo(nombre){
  const arts=getArts();
  const a=arts.find(x=>x.n===nombre);
  if(!a)return;
  const m=a.k>0?((a.v-a.k)/a.v*100).toFixed(1):null;
  abrirModal('<div class="modal-title">Editar Artículo</div>'
    +'<div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--sub);">'+esc(a.n)+'</div>'
    +'<label>Precio venta</label>'
    +'<input type="number" id="eArtPrecio" value="'+Math.round(a.v)+'" inputmode="numeric">'
    +'<label>Precio costo</label>'
    +'<input type="number" id="eArtCosto" value="'+Math.round(a.k)+'" inputmode="numeric">'
    +(m?'<div style="font-size:12px;color:var(--yellow);margin-top:6px;">Margen actual: '+m+'%</div>':'')
    +'<div class="row" style="margin-top:14px;">'
    +'<button class="btn btn-p" onclick="guardarEditArt(this.dataset.n)" data-n="'+esc(a.n)+'">Guardar</button>'
    +'<button class="btn btn-s" onclick="cerrarModal()">Cancelar</button>'
    +'</div>'
    +(artsEdit[a.n]?'<button class="btn btn-d" style="width:100%;margin-top:8px;" onclick="resetArt(this.dataset.n)" data-n="'+esc(a.n)+'">Restaurar precio original</button>':''));
}

function guardarEditArt(nombre){
  const v=parseFloat($('eArtPrecio')?.value)||0;
  const k=parseFloat($('eArtCosto')?.value)||0;
  if(!v){notif('Ingresá un precio');return;}
  if(!artsEdit[nombre])artsEdit[nombre]={};
  artsEdit[nombre].v=v;artsEdit[nombre].k=k;
  saveArts();cerrarModal();renderArticulos();notif('Precio actualizado');
}

function resetArt(nombre){
  delete artsEdit[nombre];
  saveArts();cerrarModal();renderArticulos();notif('Precio restaurado');
}

function renderArticulos(){
  const q=($('searchArt')?.value||'').toLowerCase().trim();
  let arts=ARTS;
  if(q)arts=arts.filter(a=>a.n.toLowerCase().includes(q));
  arts=getArts();
  if(q)arts=arts.filter(a=>a.n.toLowerCase().includes(q));
  const el=$('listaArticulos');
  if(!arts.length){el.innerHTML='<div class="empty"><div>Sin resultados</div></div>';return;}
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'

    +'<button class="btn btn-p" onclick="abrirNuevoArticulo()" style="padding:6px 12px;font-size:12px;">+ Nuevo</button>'
    +'</div>';
  for(const a of arts){

    const editado=artsEdit[a.n];
    h+='<div class="art-item" onclick="editarArticulo(this.dataset.n)" data-n="'+esc(a.n)+'" style="cursor:pointer;">'
      +'<div class="art-nombre">'+esc(a.n)+(editado?'<span style="font-size:9px;color:var(--yellow);margin-left:6px;">✏</span>':'')+'</div>'

  el.innerHTML=h;

function fmSelProd(idx,nombre,precioBase){
  if($('fmProd'))$('fmProd').value=nombre;
  if($('fmProdList'))$('fmProdList').style.display='none';
  let precio=parseFloat(precioBase)||0;
  if(fmCliSel){
    const pc=PRECIOS.find(p=>p.c===fmCliSel.id&&p.p===nombre);
    if(pc){precio=pc.v;if($('fmProdInfo'))$('fmProdInfo').textContent='Precio hist. cliente: $'+fmt(pc.v);}
    else if($('fmProdInfo'))$('fmProdInfo').textContent='Precio base: $'+fmt(precio);

function fmAgregar(){
  const prod=$('fmProd')?.value||'';
  const cant=parseInt($('fmCant')?.value)||0;
  const precio=parseFloat($('fmPrecio')?.value)||0;
  if(!prod||!cant||!precio){notif('Completa producto, cantidad y precio');return;}
  fmItems.push({prod,cant,precio,sub:cant*precio});
  if($('fmProd'))$('fmProd').value='';

function fmRender(){

function confirmarDoc(){
  if(!fmCliSel){notif('Selecciona un cliente');return;}
  if(!fmItems.length){notif('Agrega al menos un articulo');return;}
  const total=fmItems.reduce((a,it)=>a+it.sub,0);

  const obj={id:Date.now(),cliente:fmCliSel.nombre,clienteId:fmCliSel.id,
    items:fmItems.map(it=>({prod:it.prod,cant:it.cant,precio:it.precio})),

    obs:$('fmObs')?.value||'',fecha,estado:'pendiente'};
  if(fmTipo==='presup'){presupuestos.unshift(obj);save();cerrarModal();renderPresup();}

}

function compartirListaHTML(){
  const html=window._listaHTML||'';
  if(!html){notif('Genera la lista primero');return;}
  
  // Intentar Web Share API con archivo (iOS 15+)
  if(navigator.share){
    // Crear blob y compartir
    const blob=new Blob([html],{type:'text/html'});
    const file=new File([blob],'lista-precios-bella-vita.html',{type:'text/html'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'Lista de Precios Bella Vita'}).catch(()=>compartirComoTexto());
    } else {
      // Compartir solo texto/url
      compartirComoTexto();
    }
  } else {
    compartirComoTexto();
  }
}

function compartirComoTexto(){
  // Fallback: descargar como archivo
  const html=window._listaHTML||'';
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='lista-precios-bella-vita.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  notif('Lista descargada');
}

function generarListaPDF(lid){
  const listasAll=[
    {id:'dist',nombre:'Lista DIST',canal:'Distribuidores',
     productos:ARTS.filter(a=>a.canal==='dist'||(a.n&&a.n.includes('DIST')))},
    {id:'ptovta',nombre:'Lista Pto. Vta.',canal:'Puntos de Venta',
     productos:ARTS.filter(a=>a.canal==='ptovta'||(a.n&&(a.n.includes('pto vta')||a.n.includes('pto de vta'))))},
    {id:'publico',nombre:'Lista P\u00fablico',canal:'P\u00fablico / Final',
     productos:ARTS.filter(a=>a.canal==='publico'||(a.n&&!a.n.includes('DIST')&&!a.n.includes('pto vta')&&(a.n.toLowerCase().includes('aceite')||a.n.toLowerCase().includes('oliva'))))},
    ...listasCustom
  ];
  const lista=listasAll.find(l=>l.id===lid||l.id===String(lid));
  if(!lista){notif('Lista no encontrada');return;}

  const conIva=window._listaExportIva||false;
  const filtroProd=window._listaExportProd||'todos';
  const IVA=1.21;

  let prods=lista.productos||[];
  if(filtroProd==='aove') prods=prods.filter(p=>{const n=(p.n||'').toLowerCase();return n.includes('aceite')||n.includes('oliva');});
  else if(filtroProd==='aceitunas') prods=prods.filter(p=>{const n=(p.n||'').toLowerCase();return n.includes('negra')||n.includes('verde')||(n.includes('aceit')&&!n.includes('oliva'))||n.includes('pickle')||n.includes('pepinillo');});

  const logoSrc=document.getElementById('appLogo')?.src||'';
  const conIvaLabel=conIva?'Con IVA incluido':'Sin IVA';
  const fecha=new Date().toLocaleDateString('es-AR');

  function getImgProd(nombre){
    const n=nombre.toLowerCase();
    if(n.includes('3000')&&n.includes('pet')) return window._IMGS&&window._IMGS.pet3000||'';
    if(n.includes('2000')&&n.includes('pet')) return window._IMGS&&window._IMGS.pet2000||'';
    if(n.includes('1000')&&n.includes('pet')) return window._IMGS&&window._IMGS.pet1000||'';
    if(n.includes('500')&&n.includes('pet')) return window._IMGS&&window._IMGS.pet500||'';
    if(n.includes('250')&&n.includes('pet')) return window._IMGS&&window._IMGS.pet250||'';
    if(n.includes('500')&&!n.includes('pet')) return window._IMGS&&window._IMGS.v500||'';
    if(n.includes('250')&&!n.includes('pet')) return window._IMGS&&window._IMGS.v250||'';
    return '';
  }

  function nombreLimpio(n){
    return n.replace(/\s*\(DIST\)/gi,'').replace(/\s*\(pto vta\)/gi,'').replace(/\s*\(pto de vta\)/gi,'').trim();
  }

  // Mostrar overlay dentro de la app
  var old=document.getElementById('pdfOverlay');
  if(old)old.remove();

  const overlay=document.createElement('div');
  overlay.id='pdfOverlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:9999;background:#111110;overflow-y:auto;-webkit-overflow-scrolling:touch;';

  // Barra de acciones sticky
  const bar=document.createElement('div');
  bar.style.cssText='position:sticky;top:0;z-index:10;background:#111110;padding:10px 12px;display:flex;gap:8px;border-bottom:1px solid #333;';
  bar.innerHTML='<button onclick="cerrarPdfOverlay()" style="flex:0 0 auto;padding:10px 14px;background:#2a2a27;color:#ccc;border:1px solid #444;border-radius:8px;font-size:13px;cursor:pointer;">&#8592; Volver</button>'
    +'<button onclick="compartirListaHTML()" style="flex:1;padding:10px;background:#4CAF7D;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">&#128279; Compartir lista</button>';
  overlay.appendChild(bar);

  // Contenido de la lista
  const content=document.createElement('div');
  content.style.cssText='padding:16px;';

  // Header
  let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #333;">'
    +'<img src="'+logoSrc+'" style="height:44px;">'
    +'<div style="text-align:right;">'
    +'<div style="font-size:16px;font-weight:800;color:#fff;">'+esc(lista.nombre)+'</div>'
    +'<div style="font-size:11px;color:#888;margin-top:3px;">'+esc(lista.canal)+' &bull; '+conIvaLabel+'</div>'
    +'<div style="font-size:10px;color:#555;margin-top:2px;">'+fecha+'</div>'
    +'</div></div>';

  // Productos
  for(const p of prods){
    const precio=conIva?Math.round(p.v*IVA):Math.round(p.v);
    const imgSrc=getImgProd(p.n||'');
    html+='<div style="display:flex;align-items:center;background:#1e1e1c;border-radius:12px;border:1px solid #2a2a27;padding:14px 16px;margin-bottom:10px;gap:14px;">'
      +(imgSrc?'<img src="'+imgSrc+'" style="width:90px;height:120px;object-fit:contain;flex-shrink:0;">':'<div style="width:90px;height:120px;flex-shrink:0;"></div>')
      +'<div style="flex:1;">'
      +'<div style="font-size:12px;color:#777;margin-bottom:6px;line-height:1.3;">'+esc(nombreLimpio(p.n||''))+'</div>'
      +'<div style="font-size:36px;font-weight:900;color:#fff;line-height:1;">$'+Math.round(precio).toLocaleString('es-AR')+'</div>'
      +'<div style="font-size:11px;color:#4CAF7D;margin-top:5px;">'+conIvaLabel+'</div>'
      +'</div></div>';
  }

  // Footer
  html+='<div style="margin-top:20px;padding-top:12px;border-top:1px solid #333;font-size:10px;color:#555;text-align:center;">'
    +'Bella Vita Premium &bull; administracion@grupobellavita.com'
    +'</div>';

  content.innerHTML=html;
  overlay.appendChild(content);
  document.body.appendChild(overlay);
  
  // Guardar HTML para compartir
  window._listaHTML='<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width">'
    +'<title>'+esc(lista.nombre)+' - Bella Vita</title>'
    +'<style>body{background:#111110;color:#f0ede6;font-family:-apple-system,sans-serif;margin:0;padding:16px;}'
    +'@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}'
    +'<\/style><\/head><body>'+html+'<\/body><\/html>';
  
  cerrarModal();
}




// ====== REPORTES ======
function renderReportes(){
  const desdeEl=$('repDesde')?.value||'';
  const hastaEl=$('repHasta')?.value||'';
  let facts=getAllFacts();
  if(desdeEl||hastaEl){
    facts=facts.filter(f=>{
      if(!f.f)return false;
      const pts=f.f.split('/');
      if(pts.length<3)return false;
      const ts=new Date(parseInt('20'+pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));
      if(desdeEl&&ts<new Date(desdeEl))return false;
      if(hastaEl&&ts>new Date(hastaEl))return false;
      return true;
    });
  }

  const vencidas=facts.filter(f=>f.e==='vencida');
  const pendTotal=facts.reduce((a,f)=>a+f.p,0);
  const totalFact=facts.reduce((a,f)=>a+f.t,0);
  const totalCosto=facts.reduce((a,f)=>a+f.k,0);
  const margen=totalCosto>0?((totalFact-totalCosto)/totalFact*100).toFixed(1):'--';
  const pc={};facts.forEach(f=>{pc[f.c]=(pc[f.c]||0)+f.t;});
  const topCli=Object.entries(pc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const pm={};facts.forEach(f=>{
    const pts=f.f.split('/');
    if(pts.length>=2){const k=pts[1]+'/'+(pts[2]||'26');pm[k]=(pm[k]||0)+f.t;}
  });

  const hoyRep=new Date();
  const defDesde=hoyRep.getFullYear()+'-01-01';
  const defHasta=hoyRep.toISOString().split('T')[0];

  let h='<div class="card" style="margin-bottom:10px;">'
    +'<div class="card-title">Filtro de período</div>'
    +'<div class="row">'
    +'<div style="flex:1"><label>Desde</label><input type="date" id="repDesde" value="'+defDesde+'" onchange="renderReportes()"></div>'
    +'<div style="flex:1"><label>Hasta</label><input type="date" id="repHasta" value="'+defHasta+'" onchange="renderReportes()"></div>'
    +'</div>'
    +'<div class="filtros" style="margin-top:8px;margin-bottom:0;">'
    +'<button class="fbtn on" data-opt="0" onclick="setRepAnioBtn(this)">Este año</button>'
    +'<button class="fbtn" data-opt="1" onclick="setRepAnioBtn(this)">2025</button>'
    +'<button class="fbtn" data-opt="2" onclick="setRepAnioBtn(this)">2024</button>'
    +'<button class="fbtn" data-opt="3" onclick="setRepAnioBtn(this)">Todo</button>'
    +'</div></div>';

  h+='<div class="stats-grid">'
    +'<div class="stat-box"><div class="stat-val">$'+fmt(totalFact/1000000)+'M</div><div class="stat-label">Facturado</div></div>'
    +'<div class="stat-box"><div class="stat-val" style="color:var(--red);">$'+fmt(pendTotal/1000)+'K</div><div class="stat-label">Pendiente</div></div>'
    +'<div class="stat-box"><div class="stat-val" style="color:var(--yellow);">'+margen+'%</div><div class="stat-label">Margen</div></div>'
    +'<div class="stat-box"><div class="stat-val" style="color:var(--red);">'+vencidas.length+'</div><div class="stat-label">Vencidas</div></div>'
    +'</div>';

  h+='<div class="reporte-card"><div class="rep-title">Top 5 Clientes</div>';
  for(let i=0;i<topCli.length;i++)h+='<div class="rep-row"><span class="rep-label">'+(i+1)+'. '+esc(topCli[i][0])+'</span><span class="rep-val pos">$'+fmt(topCli[i][1])+'</span></div>';
  h+='</div>';

  const totalVenc=vencidas.reduce((a,f)=>a+f.p,0);
  h+='<div class="reporte-card">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
    +'<div class="rep-title" style="margin-bottom:0;">Facturas Vencidas</div>'
    +'<button onclick="verTodasVencidas()" style="background:var(--red-dim);border:.5px solid var(--red);color:var(--red);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;">Ver todas ('+vencidas.length+')</button>'
    +'</div>';
  for(const f of vencidas.slice(0,6))h+='<div class="rep-row" style="cursor:pointer;" onclick="abrirFactura('+f.id+')">'
    +'<div><div style="font-size:12px;font-weight:600;">'+esc(f.c)+'</div><div style="font-size:10px;color:var(--sub);">#'+f.id+' &bull; '+f.f+'</div></div>'
    +'<span class="rep-val neg">$'+fmt(f.p)+'</span></div>';
  h+='<div class="rep-row" style="border-top:.5px solid var(--border);margin-top:6px;padding-top:8px;">'
    +'<span style="font-weight:700;">Total vencido</span><span class="rep-val neg">$'+fmt(totalVenc)+'</span></div></div>';

  // Facturacion por mes ordenada
  const mesesOrdenados=Object.entries(pm).sort((a,b)=>{
    const pa=a[0].split('/'),pb=b[0].split('/');
    const ya=parseInt(pa[1]||'0'),yb=parseInt(pb[1]||'0');
    const ma=parseInt(pa[0]||'0'),mb=parseInt(pb[0]||'0');
    return ya!==yb?ya-yb:ma-mb;
  });

  h+='<div class="reporte-card"><div class="rep-title">Facturación por mes</div>';
  const mnom=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  for(const [m,t] of mesesOrdenados.slice(-8)){
    const pts=m.split('/');
    const label=(mnom[parseInt(pts[0])]||pts[0])+' 20'+pts[1];
    h+='<div class="rep-row"><span class="rep-label">'+label+'</span><span class="rep-val pos">$'+fmt(t)+'</span></div>';
  }
  h+='</div>';

  // Grafico SVG
  if(mesesOrdenados.length>1){
    const graf=mesesOrdenados.slice(-8);
    const maxVal=Math.max(...graf.map(([,t])=>t));
    const W=320,H=110,PAD=6,BW=Math.floor((W-PAD*2)/graf.length)-3;
    let bars='';
    graf.forEach(([m,t],i)=>{
      const pts=m.split('/');
      const barH=Math.round((t/maxVal)*(H-28));
      const x=PAD+i*(BW+3);
      const y=H-barH-18;
      bars+='<rect x="'+x+'" y="'+y+'" width="'+BW+'" height="'+barH+'" rx="3" fill="#4CAF7D" opacity="0.85"/>'
        +'<text x="'+(x+BW/2)+'" y="'+(H-4)+'" text-anchor="middle" font-size="7" fill="#666">'+(mnom[parseInt(pts[0])]||pts[0])+'</text>';
    });
    h+='<div class="reporte-card"><div class="rep-title">Evolución mensual</div>'
      +'<svg viewBox="0 0 '+W+' '+H+'" width="100%">'+bars+'</svg></div>';
  }

  $('contenidoReportes').innerHTML=h;
}

function setRepAnioBtn(btn){
  document.querySelectorAll('#sec-reportes .fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const opt=parseInt(btn.getAttribute('data-opt')||'0');
  const hoy=new Date();
  let desde,hasta=hoy.toISOString().split('T')[0];
  if(opt===0){desde=hoy.getFullYear()+'-01-01';}
  else if(opt===1){desde='2025-01-01';hasta='2025-12-31';}
  else if(opt===2){desde='2024-01-01';hasta='2024-12-31';}
  else{desde='2023-01-01';}
  const d=$('repDesde'),h2=$('repHasta');
  if(d)d.value=desde;if(h2)h2.value=hasta;
  renderReportes();
}


function verTodasVencidas(){
  const facts=getAllFacts();
  const vencidas=facts.filter(f=>f.e==='vencida').sort((a,b)=>b.p-a.p);
  const total=vencidas.reduce((a,f)=>a+f.p,0);
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'
    +'<div class="modal-title" style="margin-bottom:0;">Vencidas ('+vencidas.length+')</div></div>'
    +'<div style="background:var(--red-dim);border:.5px solid var(--red);border-radius:var(--r2);padding:10px 12px;margin-bottom:12px;display:flex;justify-content:space-between;">'
    +'<span style="color:var(--red);font-weight:600;">Total vencido</span>'
    +'<span style="color:var(--red);font-weight:800;">$'+fmt(total)+'</span></div>';
  for(const f of vencidas){
    h+='<div class="rep-row" style="cursor:pointer;" onclick="cerrarModal();setTimeout(function(){abrirFactura('+f.id+')},150)">'
      +'<div><div style="font-size:12px;font-weight:600;">'+esc(f.c)+'</div>'
      +'<div style="font-size:10px;color:var(--sub);">#'+f.id+' &bull; Vence: '+f.v+'</div></div>'
      +'<span class="rep-val neg">$'+fmt(f.p)+'</span></div>';
  }
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;">'
    +'<button class="btn btn-p" data-tipo="vencidas" onclick="compartirReporteBtn(this)">Compartir</button>'
    +'<button class="btn btn-s" onclick="cerrarModal()">Cerrar</button></div>';
  abrirModal(h);
}

function compartirReporteBtn(btn){
  compartirReporte(btn.getAttribute('data-tipo'));
}

function compartirReporte(tipo){
  const facts=getAllFacts();
  let texto='',titulo='';
  if(tipo==='vencidas'){
    const v=facts.filter(f=>f.e==='vencida').sort((a,b)=>b.p-a.p);
    const total=v.reduce((a,f)=>a+f.p,0);
    titulo='Facturas Vencidas - Bella Vita';
    texto='FACTURAS VENCIDAS\n'+new Date().toLocaleDateString('es-AR')+'\nTotal: $'+fmt(total)+'\n\n';
    for(const f of v) texto+='#'+f.id+' '+f.c+' - $'+fmt(f.p)+' (vence '+f.v+')\n';
  }
  if(navigator.share){
    navigator.share({title:titulo,text:texto}).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(texto).then(()=>notif('Copiado')).catch(()=>{});
  }
}

window.onload = function(){
  initHeader();
  renderFacturas();
  const k = localStorage.getItem('bv_key');
  if(k && $('apiKey')) $('apiKey').value = k;
};


</script>
